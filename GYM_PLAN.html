function mkWeekData(){
  return DAYS.map(d=>({
    done:false,conditioning:null,
    sets:d.exercises.map(ex=>Array.from({length:ex.sets},()=>({kg:'',reps:'',done:false}))),
    notes:d.exercises.map(()=>''),
  }));
}
function getNextWorkoutDay(s){
  const wd=s.weeks[s.currentWeek]||mkWeekData();
  const first=wd.findIndex(d=>!d.done);
  return first>=0?first:0;
}
function loadStore(){
  try{
    const r=localStorage.getItem('pplbeast_v3');
    if(r){
      const parsed=JSON.parse(r);
      // Migrate: ensure every day has sets/notes for all current exercises
      const fresh=mkWeekData();
      Object.keys(parsed.weeks).forEach(wn=>{
        const wd=parsed.weeks[wn];
        fresh.forEach((freshDay,di)=>{
          if(!wd[di])return;
          freshDay.sets.forEach((freshExSets,ei)=>{
            if(!wd[di].sets[ei]){
              wd[di].sets[ei]=freshExSets;
              wd[di].notes=wd[di].notes||[];
              if(!wd[di].notes[ei])wd[di].notes[ei]='';
            }
          });
        });
      });
      return parsed;
    }
  }catch(e){}
  return{currentWeek:1,weeks:{1:mkWeekData()}};
}
function saveStore(d){try{localStorage.setItem('pplbeast_v3',JSON.stringify(d));}catch(e){}}

// ── TIMER HOOK ────────────────────────────────────────────────────
// FIX: Use a ref for target seconds so we can restart even when already running.
// The key insight: we store the "pending start" in a ref and use a counter to
// force the useEffect to re-run even when `running` doesn't change.
function useTimer(){
  const[seconds,setSeconds]=useState(120);
  const[running,setRunning]=useState(false);
  const[visible,setVisible]=useState(false);
  const[done,setDone]=useState(false);
  const[restartKey,setRestartKey]=useState(0);
  const ref=useRef(null);
  const pendingSecs=useRef(120);

  useEffect(()=>{
    clearInterval(ref.current);
    if(running){
      setSeconds(pendingSecs.current);
      ref.current=setInterval(()=>{
        setSeconds(s=>{
          if(s<=1){clearInterval(ref.current);setRunning(false);setDone(true);return 0;}
          return s-1;
        });
      },1000);
    }
    return()=>clearInterval(ref.current);
  },[running,restartKey]);

  const start=useCallback((s)=>{
    clearInterval(ref.current);
    pendingSecs.current=s;
    setSeconds(s);
    setDone(false);
    setVisible(true);
    setRunning(true);
    setRestartKey(k=>k+1);
  },[]);

  const reset=useCallback(()=>{
    clearInterval(ref.current);
    setRunning(false);
    setDone(false);
    setSeconds(pendingSecs.current);
  },[]);

  const close=useCallback(()=>{clearInterval(ref.current);setRunning(false);setVisible(false);setDone(false);},[]);
  const fmt=(s)=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return{seconds,running,visible,done,start,close,reset,fmt};
}

// ── SPARKLINE ─────────────────────────────────────────────────────
function Sparkline({values,color}){
  const w=80,h=28,pad=3;
  const valid=values.filter(v=>v>0);
  if(valid.length<2)return(
    <div style={{width:w,height:h,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.5rem',color:'var(--dim)'}}>NO DATA</span>
    </div>
  );
  const mn=Math.min(...valid),mx=Math.max(...valid);
  const range=mx-mn||1;
  const pts=values.map((v,i)=>{
    const x=pad+(i/(values.length-1))*(w-pad*2);
    const y=v>0?h-pad-((v-mn)/range)*(h-pad*2):null;
    return{x,y,v};
  }).filter(p=>p.y!==null);
  const path='M'+pts.map(p=>`${p.x},${p.y}`).join('L');
  return(
    <svg width={w} height={h} style={{overflow:'visible'}}>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.7"/>
      {pts.map((p,i)=>i===pts.length-1&&(
        <circle key={i} cx={p.x} cy={p.y} r="2.5" fill={color}/>
      ))}
    </svg>
  );
}

// ── TOAST ─────────────────────────────────────────────────────────
function Toast({msg}){
  return <div className="toast">{msg}</div>;
}

// ── SPARKLINE ROW ─────────────────────────────────────────────────
function SparkRow({exName,store,weekNums,dayIdx,exIdx,color}){
  const history=useMemo(()=>{
    return weekNums.slice(-6).map(wn=>{
      const wd=store.weeks[wn]||[];
      const sets=wd[dayIdx]?.sets[exIdx]||[];
      return Math.max(0,...sets.map(s=>parseFloat(s.kg)||0));
    });
  },[store,weekNums,dayIdx,exIdx]);

  const lastVal=history[history.length-1];
  const prevVal=history.slice(0,-1).reverse().find(v=>v>0)||0;
  const trend=lastVal>prevVal?'+':lastVal<prevVal?'−':'';
  const trendColor=lastVal>prevVal?'var(--legs)':lastVal<prevVal?'var(--push)':'var(--muted)';

  if(history.every(v=>v===0))return null;
  return(
    <div className="ex-spark-row">
      <span className="ex-spark-label">TREND</span>
      <Sparkline values={history} color={TYPE_HEX[color]||'#888'}/>
      {lastVal>0&&<div className="ex-spark-val" style={{color:trendColor}}>
        {trend}{lastVal}kg
      </div>}
    </div>
  );
}

// ── 1RM ESTIMATOR (Epley formula) ─────────────────────────────────
function calc1RM(kg,reps){
  const k=parseFloat(kg)||0, r=parseInt(reps)||0;
  if(!k||!r||r===1)return k||0;
  return Math.round(k*(1+r/30));
}

// ── PLATE CALCULATOR ──────────────────────────────────────────────
// Bar = 20kg Olympic. Shows plates per side.
const PLATES=[25,20,15,10,5,2.5,1.25];
function calcPlates(totalKg){
  const bar=20;
  let remaining=(totalKg-bar)/2;
  if(remaining<=0)return [];
  const result=[];
  for(const p of PLATES){
    const count=Math.floor(remaining/p+0.001);
    if(count>0){result.push({p,count});remaining-=count*p;}
  }
  return result;
}
function PlateCalc({kg}){
  const k=parseFloat(kg)||0;
  if(k<20)return null;
  const plates=calcPlates(k);
  if(!plates.length)return null;
  const COLORS={25:'#e53935',20:'#1e88e5',15:'#ffb300',10:'#43a047',5:'#8e24aa',2.5:'#6d4c41',1.25:'#546e7a'};
  return(
    <div style={{display:'flex',alignItems:'center',gap:'3px',padding:'0.25rem 0.85rem',background:'rgba(0,0,0,0.25)',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.45rem',color:'var(--dim)',marginRight:'3px',flexShrink:0}}>🏋 PLATES/SIDE:</span>
      {plates.map(({p,count})=>(
        <span key={p} style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',padding:'0.1rem 0.35rem',borderRadius:'3px',background:COLORS[p]||'#444',color:'#fff',fontWeight:700}}>
          {count>1?`${count}×`:''}
          {p}kg
        </span>
      ))}
    </div>
  );
}

// ── DRAGGABLE TIMER ───────────────────────────────────────────────
function DraggableTimer({timer}){
  const ref=useRef(null);
  const pos=useRef(null);
  const isDragging=useRef(false);
  const[style,setStyle]=useState({top:'calc(env(safe-area-inset-top,0) + 56px)',right:'0.75rem',left:'auto',bottom:'auto'});

  const onPointerDown=useCallback((e)=>{
    if(e.target.closest('button'))return;
    isDragging.current=true;
    const el=ref.current;
    const rect=el.getBoundingClientRect();
    pos.current={startX:e.clientX,startY:e.clientY,origLeft:rect.left,origTop:rect.top};
    el.setPointerCapture(e.pointerId);
    e.preventDefault();
  },[]);

  const onPointerMove=useCallback((e)=>{
    if(!isDragging.current||!pos.current)return;
    const dx=e.clientX-pos.current.startX;
    const dy=e.clientY-pos.current.startY;
    const el=ref.current;
    const vw=window.innerWidth, vh=window.innerHeight;
    const w=el.offsetWidth, h=el.offsetHeight;
    const left=Math.min(Math.max(0,pos.current.origLeft+dx),vw-w);
    const top=Math.min(Math.max(0,pos.current.origTop+dy),vh-h);
    setStyle({left:left+'px',top:top+'px',right:'auto',bottom:'auto'});
  },[]);

  const onPointerUp=useCallback(()=>{isDragging.current=false;},[]);

  return(
    <div ref={ref} className="timer-overlay"
      style={{...style,cursor:'grab',userSelect:'none',touchAction:'none'}}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
    >
      <div style={{fontFamily:'var(--font-mono)',fontSize:'0.48rem',color:'var(--dim)',letterSpacing:'0.06em',marginBottom:'0.15rem',textAlign:'center'}}>⠿ DRAG</div>
      <button className="timer-close" onClick={timer.close}>✕</button>
      <div className="timer-label">REST TIMER {timer.done?'— GO!':''}</div>
      <div className={`timer-display ${timer.done?'done':''}`}>{timer.fmt(timer.seconds)}</div>
      <div className="timer-presets">
        {[[60,'1m'],[90,'90s'],[120,'2m'],[180,'3m'],[300,'5m']].map(([s,l])=>(
          <button key={s} className="timer-preset-btn" onClick={()=>timer.start(s)}>{l}</button>
        ))}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────
function App(){
  const[store,setStore]=useState(loadStore);
  const storeRef=useRef(null);
  storeRef.current=store;
  const[tab,setTab]=useState('workout');
  // viewWeek: what week user is currently browsing (may differ from store.currentWeek when swiping)
  // Always start on the actual current training week
  const[viewWeek,setViewWeek]=useState(()=>{
    const s=loadStore();
    return s.currentWeek;
  });
  // dayIdx: starts at the next incomplete day within the current training week
  const[dayIdx,setDayIdx]=useState(()=>{
    const s=loadStore();
    return getNextWorkoutDay(s);
  });
  const[showReset,setShowReset]=useState(false);
  const[compareA,setCompareA]=useState(()=>store.currentWeek);
  const[compareB,setCompareB]=useState(()=>store.currentWeek>1?store.currentWeek-1:null);
  const[histDetail,setHistDetail]=useState(null);
  const[toast,setToast]=useState(null);
  const[copied,setCopied]=useState(false);
  const[showCopyConfirm,setShowCopyConfirm]=useState(false);
  const timer=useTimer();
  const swipeRef=useRef(null);
  const swipeStartX=useRef(null);
  const nextSetRef=useRef(null);

  const week=store.currentWeek; // actual training week (writes go here)
  // viewWeek: week shown in header AND drives workout display (browsable via swipe)
  const weekData=(store.weeks[viewWeek]||mkWeekData()); // workout content uses viewWeek
  const dayData=weekData[dayIdx];
  const day=DAYS[dayIdx];
  const allDone=weekData.every(d=>d.done);

  const handleReset=useCallback(()=>{
    const nw=week+1;
    update(s=>{s.weeks[nw]=mkWeekData();s.currentWeek=nw;});
    setViewWeek(nw);
    setDayIdx(0);
    setShowReset(false);
  },[week,update]);

  useEffect(()=>{if(allDone&&weekData.length===7&&viewWeek===week)setShowReset(true);},[allDone,viewWeek,week]);
  const weekNums=Object.keys(store.weeks).map(Number).sort((a,b)=>a-b);
  // Only show weeks that have at least one completed day (for history/compare/stats)
  const activeWeekNums=weekNums.filter(wn=>(store.weeks[wn]||[]).some(d=>d.done));
  const totalWeeks=activeWeekNums.length||1;
  const completedDays=activeWeekNums.reduce((a,wn)=>a+(store.weeks[wn]||[]).filter(d=>d.done).length,0);

  // Previous week data for this day (for inline reference)
  const prevWeekSets=useMemo(()=>{
    const pw=viewWeek-1;
    if(!store.weeks[pw])return null;
    return store.weeks[pw][dayIdx]?.sets||null;
  },[store,viewWeek,dayIdx]);

  // Personal bests across all weeks
  const pbs=useMemo(()=>{
    const r={};
    DAYS.forEach((d,di)=>{
      d.exercises.forEach((ex,ei)=>{
        let best=0;
        activeWeekNums.forEach(wn=>{
          const wd=store.weeks[wn]||[];
          (wd[di]?.sets[ei]||[]).forEach(s=>{const v=parseFloat(s.kg)||0;if(v>best)best=v;});
        });
        r[ex.name]=best;
      });
    });
    return r;
  },[store]);

  // Per-exercise PR detection (is a set a new PB?)
  const isPR=useCallback((exName,kg)=>{
    const v=parseFloat(kg)||0;
    if(!v)return false;
    const allPrev=[];
    activeWeekNums.forEach(wn=>{
      if(wn===week)return;
      DAYS.forEach((d,di)=>{
        d.exercises.forEach((ex,ei)=>{
          if(ex.name!==exName)return;
          (store.weeks[wn]?.[di]?.sets[ei]||[]).forEach(s=>{const kv=parseFloat(s.kg)||0;if(kv)allPrev.push(kv);});
        });
      });
    });
    return v>0&&(allPrev.length===0||v>Math.max(...allPrev));
  },[store,weekNums,week]);

  // Show toast helper
  const showToast=useCallback((msg)=>{
    setToast(msg);
    setTimeout(()=>setToast(null),2000);
  },[]);

  const update=useCallback((fn)=>{
    setStore(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      fn(next);
      saveStore(next);
      return next;
    });
  },[]);

  const updateSet=useCallback((ei,si,field,val)=>{
    update(s=>{s.weeks[viewWeek][dayIdx].sets[ei][si][field]=val;});
  },[viewWeek,dayIdx,update]);

  const toggleSet=useCallback((ei,si)=>{
    const freshStore=storeRef.current;
    const freshWeek=freshStore.currentWeek;
    const wasAlreadyDone=freshStore.weeks[viewWeek]?.[dayIdx]?.sets[ei]?.[si]?.done;
    const exSets=freshStore.weeks[viewWeek]?.[dayIdx]?.sets[ei]||[];
    const isLastSetOfExercise=si===exSets.length-1;
    update(s=>{
      const set=s.weeks[viewWeek][dayIdx].sets[ei][si];
      set.done=!set.done;
    });
    // Start timer only when marking AS done AND it is NOT the last set of this exercise
    if(!wasAlreadyDone&&!isLastSetOfExercise){
      const compoundEx=['Barbell Bench Press','Overhead Barbell Press','Incline Barbell Press','Back Squats','Front Squats / Hack Squats','Deadlifts','Romanian Deadlifts','Barbell Rows','T-Bar Row / Chest-Supported Row','Weighted Pull-Ups / Lat Pulldown','Leg Press','Hip Thrusts'];
      const dayType=DAYS[dayIdx].type;
      const exName=DAYS[dayIdx].exercises[ei]?.name;
      timer.start(dayType==='abs'?60:compoundEx.includes(exName)?180:90);
    }
  },[dayIdx,update,timer]);

  const updateNote=useCallback((ei,val)=>{
    update(s=>{s.weeks[viewWeek][dayIdx].notes[ei]=val;});
  },[viewWeek,dayIdx,update]);

  const toggleDone=useCallback(()=>{
    update(s=>{
      const d=s.weeks[viewWeek][dayIdx];
      d.done=!d.done;
    });
  },[viewWeek,dayIdx,update]);

  const selectCond=useCallback((i)=>{
    update(s=>{s.weeks[viewWeek][dayIdx].conditioning=i;});
  },[viewWeek,dayIdx,update]);

  const changeWeek=useCallback((delta)=>{
    setViewWeek(vw=>{
      const nw=Math.max(1,vw+delta);
      // If navigating forward to a week that doesn't exist yet, create it in store
      if(delta>0&&!storeRef.current.weeks[nw]){
        update(s=>{if(!s.weeks[nw])s.weeks[nw]=mkWeekData();});
      }
      return nw;
    });
  },[update]);

  // ── COPY LAST WEEK ────────────────────────────────────────────
  const copyLastWeek=useCallback(()=>{
    const prevWeek=viewWeek-1;
    if(!store.weeks[prevWeek]){showToast('NO PREVIOUS WEEK DATA');return;}
    setShowCopyConfirm(true);
  },[store,viewWeek,showToast]);

  const confirmCopyLastWeek=useCallback(()=>{
    const prevWeek=viewWeek-1;
    const prev=store.weeks[prevWeek];
    update(s=>{
      const curr=s.weeks[viewWeek][dayIdx];
      const prevDay=prev[dayIdx];
      curr.sets=prevDay.sets.map(setArr=>setArr.map(set=>({kg:set.kg,reps:set.reps,done:false})));
    });
    setShowCopyConfirm(false);
    setCopied(true);
    showToast('✓ LAST WEEK WEIGHTS COPIED');
    setTimeout(()=>setCopied(false),2000);
  },[store,viewWeek,dayIdx,update,showToast]);

  // ── SWIPE BETWEEN WEEKS (top bar) ────────────────────────────
  const weekSwipeStartX=useRef(null);
  const weekSwipeStartY=useRef(null);
  const weekSwipeTime=useRef(null);
  const weekTouchStart=useCallback(e=>{
    weekSwipeStartX.current=e.touches[0].clientX;
    weekSwipeStartY.current=e.touches[0].clientY;
    weekSwipeTime.current=Date.now();
  },[]);
  const weekTouchEnd=useCallback(e=>{
    if(weekSwipeStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-weekSwipeStartX.current;
    const dy=e.changedTouches[0].clientY-weekSwipeStartY.current;
    const dt=Date.now()-weekSwipeTime.current;
    const velocity=Math.abs(dx)/dt;
    const isTap=Math.abs(dx)<10&&Math.abs(dy)<10&&dt<300;
    if(isTap){weekSwipeStartX.current=null;return;}
    if(Math.abs(dy)>Math.abs(dx)*0.8){weekSwipeStartX.current=null;return;}
    if(Math.abs(dx)>30||velocity>0.3){
      changeWeek(dx<0?1:-1);
    }
    weekSwipeStartX.current=null;
  },[changeWeek]);

  // ── SWIPE BETWEEN DAYS ────────────────────────────────────────
  const swipeStartY=useRef(null);
  const swipeLocked=useRef(false);
  const swipeTime=useRef(null);
  const handleTouchStart=useCallback(e=>{
    swipeStartX.current=e.touches[0].clientX;
    swipeStartY.current=e.touches[0].clientY;
    swipeLocked.current=false;
    swipeTime.current=Date.now();
  },[]);
  const handleTouchEnd=useCallback(e=>{
    if(swipeStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-swipeStartX.current;
    const dy=e.changedTouches[0].clientY-swipeStartY.current;
    const dt=Date.now()-swipeTime.current;
    const velocity=Math.abs(dx)/dt; // px/ms
    // Ignore if mostly vertical or not enough movement/velocity
    if(Math.abs(dy)>Math.abs(dx)*0.8){swipeStartX.current=null;return;}
    if(Math.abs(dx)>40||velocity>0.3){
      if(dx<0)setDayIdx(i=>Math.min(i+1,DAYS.length-1));
      else setDayIdx(i=>Math.max(i-1,0));
    }
    swipeStartX.current=null;
  },[]);

  // ── WAKE LOCK (keep screen on during workout) ─────────────────
  const[wakeLockActive,setWakeLockActive]=useState(false);
  const wakeLockRef=useRef(null);
  useEffect(()=>{
    if(!('wakeLock' in navigator))return;
    const acquire=async()=>{
      try{
        if(tab==='workout'&&!wakeLockRef.current){
          wakeLockRef.current=await navigator.wakeLock.request('screen');
          setWakeLockActive(true);
          wakeLockRef.current.addEventListener('release',()=>{wakeLockRef.current=null;setWakeLockActive(false);});
        }
      }catch(e){}
    };
    const release=async()=>{
      if(wakeLockRef.current){try{await wakeLockRef.current.release();}catch(e){}wakeLockRef.current=null;setWakeLockActive(false);}
    };
    if(tab==='workout'){acquire();}else{release();}
    // Re-acquire if page becomes visible again (e.g. after screen lock)
    const onVisible=()=>{if(tab==='workout'&&document.visibilityState==='visible')acquire();};
    document.addEventListener('visibilitychange',onVisible);
    return()=>{document.removeEventListener('visibilitychange',onVisible);release();};
  },[tab]);

  // ── SWIPE BETWEEN TABS ────────────────────────────────────────
  const TABS=['workout','history','compare','stats'];
  const tabSwipeStartX=useRef(null);
  const tabSwipeStartY=useRef(null);
  const tabSwipeTime=useRef(null);
  const tabTouchStart=useCallback(e=>{
    tabSwipeStartX.current=e.touches[0].clientX;
    tabSwipeStartY.current=e.touches[0].clientY;
    tabSwipeTime.current=Date.now();
  },[]);
  const tabTouchEnd=useCallback(e=>{
    if(tabSwipeStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-tabSwipeStartX.current;
    const dy=e.changedTouches[0].clientY-tabSwipeStartY.current;
    const dt=Date.now()-tabSwipeTime.current;
    const velocity=Math.abs(dx)/dt;
    tabSwipeStartX.current=null;
    // Must be clearly horizontal
    if(Math.abs(dy)>Math.abs(dx)*0.6)return;
    if(Math.abs(dx)<40&&velocity<0.3)return;
    setTab(prev=>{
      const idx=TABS.indexOf(prev);
      if(dx<0)return TABS[Math.min(idx+1,TABS.length-1)];
      return TABS[Math.max(idx-1,0)];
    });
  },[]);

  // ── FIND NEXT INCOMPLETE SET ──────────────────────────────────
  const nextIncomplete=useMemo(()=>{
    for(let ei=0;ei<day.exercises.length;ei++){
      const sets=weekData[dayIdx]?.sets[ei]||[];
      for(let si=0;si<sets.length;si++){
        if(!sets[si].done)return{ei,si,name:day.exercises[ei].name};
      }
    }
    return null;
  },[day,weekData,dayIdx]);

  // Workout stats
  const doneSets=day.exercises.reduce((a,ex,ei)=>a+(weekData[dayIdx]?.sets[ei]||[]).filter(s=>s.done).length,0);
  const totalSets=day.exercises.reduce((a,ex)=>a+ex.sets,0);
  const totalVolume=day.exercises.reduce((a,ex,ei)=>{
    return a+(weekData[dayIdx]?.sets[ei]||[]).reduce((b,s)=>{
      const kg=parseFloat(s.kg)||0,reps=parseFloat(s.reps)||0;
      return b+(s.done?kg*reps:0);
    },0);
  },0);
  const color=TYPE_COLOR[day.type];
  const hex=TYPE_HEX[day.type];

  return(
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* TOP BAR */}
        <div className="topbar">
          <div className="topbar-inner">
            <div className="app-title">PPL <span>BEAST</span>{wakeLockActive&&<span title="Screen kept on" style={{display:'inline-block',width:'6px',height:'6px',borderRadius:'50%',background:'var(--legs)',marginLeft:'6px',verticalAlign:'middle',boxShadow:'0 0 6px var(--legs)',animation:'pulse 2s infinite'}}/>}</div>
            <div className="topbar-center">
              {tab==='workout'&&(
                <div className="week-label-tap" onTouchStart={weekTouchStart} onTouchEnd={weekTouchEnd} onClick={()=>{
                    const currentWeek = storeRef.current.currentWeek;
                    setViewWeek(currentWeek);
                    const wd = storeRef.current.weeks[currentWeek] || mkWeekData();
                    const first = wd.findIndex(d => !d.done);
                    setDayIdx(first >= 0 ? first : 0);
                  }} >
                  WEEK {viewWeek}
                </div>
              )}
            </div>
            {tab==='workout'&&(
              <button className={`copy-btn ${copied?'copied':''}`} onClick={copyLastWeek}>
                {copied?'✓ COPIED':'↑ COPY WK'}
              </button>
            )}
          </div>
        </div>

        {/* WORKOUT TAB */}
        {tab==='workout'&&(
          <div className="screen" ref={swipeRef} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
            {/* Day chips */}
            <div className="day-swipe-wrap">
              <div className="day-scroll">
                {DAYS.map((d,i)=>{
                  const chipDone=weekData[i]?.sets.reduce((a,setArr)=>a+setArr.filter(s=>s.done).length,0)||0;
                  const chipTotal=d.exercises.reduce((a,ex)=>a+ex.sets,0);
                  const chipPct=chipTotal?Math.round(chipDone/chipTotal*100):0;
                  return(
                  <div key={d.id}
                    className={`day-chip ${i===dayIdx?'active':''} ${weekData[i]?.done?'done-chip':''}`}
                    onClick={()=>setDayIdx(i)}
                  >
                    <div className="day-chip-label" style={{color:i===dayIdx?TYPE_COLOR[d.type]:undefined}}>{d.name}</div>
                    <div className="day-chip-sub">{d.label}</div>
                    {chipDone>0&&!weekData[i]?.done?(
                      <div style={{fontFamily:'var(--font-mono)',fontSize:'0.42rem',color:TYPE_COLOR[d.type],marginTop:'2px',letterSpacing:'0.02em'}}>{chipDone}/{chipTotal}</div>
                    ):(
                      <div className="day-chip-dot" style={{background:TYPE_COLOR[d.type],opacity:i===dayIdx?1:0.35}}/>
                    )}
                  </div>
                );})}
              </div>
              <div className="swipe-hint" style={{display:'none'}}>← swipe →</div>
            </div>

            <div className="workout-wrap">
              {/* Hero */}
              <div className="day-hero" style={{background:TYPE_BG[day.type]}}>
                <div style={{display:'flex',alignItems:'stretch',gap:'0.5rem'}}>
                  {/* Left: PUSH + STRENGTH + focus */}
                  <div style={{display:'flex',flexDirection:'column',justifyContent:'center',gap:'0.18rem'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                      <div className="day-hero-title" style={{color}}>{day.label}</div>
                      <div className="type-badge" style={{color,background:`rgba(0,0,0,0.3)`,border:`1px solid ${hex}40`}}>{day.sub}</div>
                      {dayData.done&&<div style={{fontFamily:'var(--font-mono)',fontSize:'0.58rem',color:'var(--legs)',fontWeight:700}}>✓ DONE</div>}
                    </div>
                    <div className="day-focus">{day.focus}</div>
                  </div>
                  {/* Right: 3 boxes pushed to edge */}
                  <div style={{marginLeft:'auto',display:'flex',gap:'0.3rem',alignItems:'stretch',flexShrink:0}}>
                    {[
                      {val:`${weekData.filter(d=>d.done).length}/7`,lbl:'DAYS DONE',clr:hex,bdr:`${hex}40`},
                      {val:`${Math.round(totalVolume)}`,lbl:'VOL KG',clr:'var(--pull)',bdr:'rgba(41,230,255,0.3)'},
                      {val:pbs[day.exercises[0]?.name]>0?`${pbs[day.exercises[0].name]}kg`:'—',lbl:'TOP PB',clr:'var(--legs)',bdr:'rgba(198,255,107,0.3)'},
                    ].map(({val,lbl,clr,bdr})=>(
                      <div key={lbl} style={{width:'58px',background:'var(--s2)',border:`1px solid ${bdr}`,borderRadius:'6px',padding:'0.35rem 0.25rem',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'2px'}}>
                        <div style={{fontFamily:'var(--font-display)',fontSize:'1.05rem',color:clr,letterSpacing:'0.03em',lineHeight:1}}>{val}</div>
                        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.4rem',color:'var(--muted)',letterSpacing:'0.05em',textAlign:'center'}}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Progress */}
              <div className="progress-row">
                <div className="progress-track">
                  <div className="progress-fill" style={{width:`${totalSets?doneSets/totalSets*100:0}%`,background:hex}}/>
                </div>
                <div className="progress-txt">{doneSets}/{totalSets} SETS</div>
              </div>

              {/* Next set banner removed */}

              {/* Exercises */}
              {day.exercises.map((ex,ei)=>{
                const sets=weekData[dayIdx]?.sets[ei]||[];
                const allSetsDone=sets.every(s=>s.done)&&sets.length>0;
                const exPB=pbs[ex.name]||0;
                const hasPR=sets.some(s=>isPR(ex.name,s.kg));
                return(
                  <div key={ei} className={`ex-card ${allSetsDone?'is-done':''}`}>
                    <div className="ex-card-head">
                      <div style={{flex:1}}>
                        <div className="ex-name-row">
                          <div className="ex-card-name">{ex.name}</div>
                          <div className="ex-sets-badge">
                            <span className="ex-sets-box">{ex.sets} SETS</span>
                            <span className="ex-sets-reps">{ex.rep} REPS</span>
                          </div>
                        </div>
                        <div className="ex-card-meta">
                          {ex.dropset&&<div className="dropset-tag">DROP</div>}
                          {ex.note&&<div style={{fontFamily:'var(--font-mono)',fontSize:'0.48rem',color:'var(--pull)',border:'1px solid rgba(0,229,255,0.3)',padding:'0.08rem 0.3rem',borderRadius:'2px',letterSpacing:'0.04em'}}>{ex.note}</div>}
                          {hasPR&&<div className="pr-badge">🏆 NEW PR</div>}
                          {allSetsDone&&<div style={{fontFamily:'var(--font-mono)',fontSize:'0.5rem',color:'var(--legs)',border:'1px solid rgba(178,255,89,0.3)',padding:'0.08rem 0.3rem',borderRadius:'2px'}}>✓ DONE</div>}
                        </div>
                      </div>
                    </div>

                    {/* Sparkline trend */}
                    <SparkRow exName={ex.name} store={store} weekNums={weekNums} dayIdx={dayIdx} exIdx={ei} color={day.type}/>

                    {/* Plate calculator — shown when a kg value exists for barbell exercises */}
                    {(()=>{
                      const barbellEx=['Barbell Bench Press','Overhead Barbell Press','Incline Barbell Press','Back Squats','Front Squats / Hack Squats','Deadlifts','Romanian Deadlifts','Barbell Rows'];
                      if(!barbellEx.includes(ex.name))return null;
                      const maxKg=Math.max(0,...sets.map(s=>parseFloat(s.kg)||0));
                      return maxKg>=20?<PlateCalc kg={maxKg}/>:null;
                    })()}

                    {/* Set headers */}
                    <div className="set-header" style={{gridTemplateColumns:'32px 1fr 1fr 40px 44px'}}>
                      <div className="set-header-lbl" style={{textAlign:'left'}}>#</div>
                      <div className="set-header-lbl">KG</div>
                      <div className="set-header-lbl">REPS</div>
                      <div className="set-header-lbl">⏱</div>
                      <div className="set-header-lbl">✓</div>
                    </div>
                    <div className="sets-table">
                      {sets.map((s,si)=>{
                        const prThisSet=isPR(ex.name,s.kg);
                        const rowBg=s.done?'rgba(198,255,107,0.05)':'transparent';
                        const rowBorder=s.done?'rgba(198,255,107,0.15)':hex+'22';
                        return(
                          <div key={si} id={`set-${dayIdx}-${ei}-${si}`}
                            className={`set-row ${prThisSet&&s.kg?'pr-row':''}`}
                            style={{gridTemplateColumns:'32px 1fr 1fr 40px 44px',background:rowBg,borderBottomColor:rowBorder}}
                          >
                            <div className="set-num" style={{color:s.done?'var(--legs)':hex}}>S{si+1}</div>
                            {/* KG stepper */}
                            <div className={`stepper-wrap ${s.kg?'has-val':''}`} style={{borderColor:s.done?'rgba(198,255,107,0.3)':s.kg?hex+'55':'var(--border2)'}}>
                              <button className="step-btn" onMouseDown={e=>{e.preventDefault();updateSet(ei,si,'kg',String(Math.max(0,(parseFloat(s.kg)||0)-2.5)));}}>−</button>
                              <input className="set-field" type="number" inputMode="decimal" placeholder="kg"
                                value={s.kg} onChange={e=>updateSet(ei,si,'kg',e.target.value)}/>
                              <button className="step-btn" onMouseDown={e=>{e.preventDefault();updateSet(ei,si,'kg',String((parseFloat(s.kg)||0)+2.5));}}>+</button>
                            </div>
                            {/* Reps stepper */}
                            <div className={`stepper-wrap ${s.reps?'has-val':''}`} style={{borderColor:s.done?'rgba(198,255,107,0.3)':s.reps?hex+'55':'var(--border2)'}}>
                              <button className="step-btn" onMouseDown={e=>{e.preventDefault();updateSet(ei,si,'reps',String(Math.max(0,(parseInt(s.reps)||0)-1)));}}>−</button>
                              <input className="set-field" type="number" inputMode="numeric" placeholder="reps"
                                value={s.reps} onChange={e=>updateSet(ei,si,'reps',e.target.value)}/>
                              <button className="step-btn" onMouseDown={e=>{e.preventDefault();updateSet(ei,si,'reps',String((parseInt(s.reps)||0)+1));}}>+</button>
                            </div>
                            <button className="timer-btn" title={ex.sets<=3&&!['Barbell Bench Press','Overhead Barbell Press','Back Squats','Deadlifts','Romanian Deadlifts'].includes(ex.name)?'60s isolation':'compound: 3min'} onClick={()=>{
                              const compound=['Barbell Bench Press','Overhead Barbell Press','Incline Barbell Press','Back Squats','Front Squats / Hack Squats','Deadlifts','Romanian Deadlifts','Barbell Rows','T-Bar Row / Chest-Supported Row','Weighted Pull-Ups / Lat Pulldown','Leg Press','Hip Thrusts'];
                              const secs=day.type==='abs'?60:compound.includes(ex.name)?180:90;
                              timer.start(secs);
                            }}>⏱</button>
                            <div className={`check-btn ${s.done?'checked':''}`} style={s.done?{}:{borderColor:hex+'88'}} onClick={()=>toggleSet(ei,si)}>✓</div>
                          </div>
                        );
                      })}
                    </div>
                    <div className="notes-row">
                      <textarea className="notes-field" rows="1" placeholder="notes..."
                        value={dayData.notes[ei]||''}
                        onChange={e=>updateNote(ei,e.target.value)}/>
                    </div>
                  </div>
                );
              })}

              {day.isAbs&&(
                <div className="cond-wrap" style={{marginTop:'0.5rem'}}>
                  <div className="section-divider" style={{marginBottom:'0.5rem'}}>🫀 CONDITIONING</div>
                  <div className="cond-opts">
                    {[{name:'Incline Treadmill Walk',dur:'20–30 min'},{name:'HIIT Bike',dur:'12–15 min'},{name:'Row Machine',dur:'10 min'}].map((o,i)=>(
                      <div key={i} className={`cond-opt ${dayData.conditioning===i?'sel':''}`} onClick={()=>selectCond(i)}>
                        <div className="cond-opt-name">{o.name}</div>
                        <div className="cond-opt-dur">{o.dur}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="finish-wrap">
                <button className={`finish-btn ${dayData.done?'is-done':''}`} onClick={toggleDone}>
                  {dayData.done?'✓ DAY COMPLETE':'MARK DAY DONE'}
                </button>
                {allDone&&(
                  <div style={{textAlign:'center',marginTop:'0.6rem',fontFamily:'var(--font-mono)',fontSize:'0.62rem',color:'var(--legs)',cursor:'pointer'}} onClick={()=>setShowReset(true)}>
                    🏆 WEEK COMPLETE — START WEEK {week+1} ▶
                  </div>
                )}
              </div>

              <div style={{margin:'0 0.75rem 1rem',padding:'0.85rem',border:'1px solid var(--border)',background:'var(--s1)',borderRadius:'8px'}}>
                <div style={{fontFamily:'var(--font-display)',fontSize:'0.9rem',letterSpacing:'0.06em',color:'#c8c8d8',marginBottom:'0.5rem'}}>PROGRESSION RULES</div>
                {[['↑ +2.5kg','Hit top reps this week'],['↓ −20% vol','Stalled 2 weeks'],['🔄 Deload','Every 6–8 weeks']].map(([r,d])=>(
                  <div key={r} style={{display:'flex',gap:'0.75rem',marginBottom:'0.3rem',alignItems:'baseline'}}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'var(--abs)',minWidth:'70px'}}>{r}</div>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'#b8b8c8'}}>{d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* HISTORY TAB */}
        {tab==='history'&&(
          <div className="screen" onTouchStart={tabTouchStart} onTouchEnd={tabTouchEnd}>
            <div className="history-wrap">
              <div className="hist-title">HISTORY</div>
              <div className="hist-sub">ALL WEEKS · {completedDays} TOTAL DAYS COMPLETED</div>
              {[...activeWeekNums].reverse().map(wn=>{
                const wd=store.weeks[wn]||mkWeekData();
                const doneCount=wd.filter(d=>d.done).length;
                const weekVol=wd.reduce((a,dayD)=>a+dayD.sets.reduce((b,setArr)=>b+setArr.reduce((c,s)=>{
                  const kg=parseFloat(s.kg)||0,reps=parseFloat(s.reps)||0;
                  return c+(s.done?kg*reps:0);
                },0),0),0);
                return(
                  <div key={wn} className="week-card">
                    <div className="week-card-head">
                      <div className="week-card-title">WEEK {wn}</div>
                      <div style={{display:'flex',gap:'0.6rem',alignItems:'center'}}>
                        {weekVol>0&&<div style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',color:'var(--pull)'}}>{Math.round(weekVol).toLocaleString()}kg</div>}
                        <div className="week-card-done">{doneCount}/7 DAYS {wn===week?'· CURRENT':''}</div>
                      </div>
                    </div>
                    <div className="week-days-grid">
                      {DAYS.map((d,di)=>{
                        const dd=wd[di];
                        const c=TYPE_COLOR[d.type];
                        return(
                          <div key={di} className={`wday-cell ${dd.done?'wday-done':''}`}
                            onClick={()=>setHistDetail({week:wn,dayIdx:di})}
                            style={{borderBottom:`2px solid ${dd.done?'var(--legs)':c}`}}
                          >
                            <div className="wday-label" style={{color:c}}>{d.label.slice(0,1)}</div>
                            <div className="wday-sub">{d.sub.slice(0,3)}</div>
                            {dd.done&&<div className="wday-check">✓</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* COMPARE TAB */}
        {tab==='compare'&&(
          <div className="screen" onTouchStart={tabTouchStart} onTouchEnd={tabTouchEnd}>
            <div className="compare-wrap">
              <div className="hist-title">COMPARE</div>
              <div className="hist-sub">WEEK VS WEEK PERFORMANCE</div>
              <div className="compare-sel">
                <select value={compareA} onChange={e=>setCompareA(Number(e.target.value))}>
                  {activeWeekNums.map(wn=><option key={wn} value={wn}>WEEK {wn}</option>)}
                </select>
                <div style={{fontFamily:'var(--font-display)',fontSize:'1.2rem',color:'var(--muted)'}}>VS</div>
                <select value={compareB??''} onChange={e=>setCompareB(e.target.value?Number(e.target.value):null)}>
                  <option value="">SELECT WEEK</option>
                  {activeWeekNums.filter(wn=>wn!==compareA).map(wn=><option key={wn} value={wn}>WEEK {wn}</option>)}
                </select>
              </div>
              {compareB!==null
                ?<CompareTable weekA={compareA} weekB={compareB} store={store}/>
                :<div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#b0b0c0',padding:'2rem 0',textAlign:'center'}}>SELECT A SECOND WEEK TO COMPARE</div>
              }

          </div>

        {/* STATS TAB */}
        {tab==='stats'&&(
          <div className="screen" onTouchStart={tabTouchStart} onTouchEnd={tabTouchEnd}>
            <div className="stats-wrap">
              <div className="hist-title">STATS</div>

                <div className="stat-card"><div className="stat-val" style={{color:'var(--push)'}}>{totalWeeks}</div><div className="stat-lbl">WEEKS TRACKED</div></div>
                <div className="stat-card"><div className="stat-val" style={{color:'var(--legs)'}}>{completedDays}</div><div className="stat-lbl">DAYS COMPLETED</div></div>
                <div className="stat-card"><div className="stat-val" style={{color:'var(--pull)'}}>{weekData.filter(d=>d.done).length}</div><div className="stat-lbl">THIS WEEK</div></div>
                <div className="stat-card"><div className="stat-val" style={{color:'var(--abs)'}}>{Math.round(completedDays/Math.max(1,totalWeeks)*10)/10}</div><div className="stat-lbl">AVG DAYS/WEEK</div></div>
              </div>
              <div style={{background:'var(--s1)',border:'1px solid var(--border)',padding:'0.85rem',marginBottom:'0.7rem',borderRadius:'8px'}}>
                <div style={{fontFamily:'var(--font-display)',fontSize:'0.9rem',letterSpacing:'0.06em',color:'#c8c8d8',marginBottom:'0.5rem'}}>WEEKLY STREAK</div>

              <div className="pb-section">
                <div className="pb-title">PERSONAL BESTS (MAX KG)</div>
                {DAYS.map((d,di)=>(
                  <div key={di}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',color:TYPE_COLOR[d.type],letterSpacing:'0.08em',padding:'0.5rem 0 0.25rem'}}>{d.label} {d.sub}</div>
                    {d.exercises.map(ex=>pbs[ex.name]>0&&(
                      <div key={ex.name} className="pb-row">
                        <div className="pb-ex">{ex.name}</div>
                        <div className="pb-val">{pbs[ex.name]} kg</div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* BOTTOM NAV */}
        <div className="bottomnav" onTouchStart={tabTouchStart} onTouchEnd={tabTouchEnd}>
          {[{id:'workout',icon:'🏋️',label:'WORKOUT'},{id:'history',icon:'📅',label:'HISTORY'},{id:'compare',icon:'📊',label:'COMPARE'},{id:'stats',icon:'⚡',label:'STATS'}].map(n=>(
            <button key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
      </div>

      {/* REST TIMER */}
      {timer.visible&&(
        <DraggableTimer timer={timer}/>
      )}

      {/* TOAST */}
      {toast&&<Toast msg={toast}/>}

      {/* COPY CONFIRM DIALOG */}
      {showCopyConfirm&&(
        <div className="dialog-overlay">
          <div className="dialog">
            <div className="dialog-title">↑ COPY WEEK {week-1}?</div>
            <div className="dialog-body">
              This will overwrite your current weights for {day.label} {day.sub} with last week's values. Sets will be marked incomplete.
            </div>
            <div className="dialog-btns">
              <button className="dialog-btn" onClick={()=>setShowCopyConfirm(false)}>CANCEL</button>
              <button className="dialog-btn danger" onClick={confirmCopyLastWeek}>COPY ▶</button>
            </div>
          </div>
        </div>
      )}

      {/* WEEK RESET DIALOG */}
      {showReset&&(
        <div className="dialog-overlay">
          <div className="dialog">
            <div className="dialog-title">🏆 WEEK {week} DONE!</div>
            <div className="dialog-body">
              All 7 days completed. Your data is saved and you can review it in History.<br/><br/>
              Ready to start Week {week+1}? Add +2.5kg on exercises where you hit the top rep range.
            </div>
            <div className="dialog-btns">
              <button className="dialog-btn" onClick={()=>setShowReset(false)}>STAY</button>
              <button className="dialog-btn danger" onClick={handleReset}>START WEEK {week+1} ▶</button>
            </div>
          </div>
        </div>
      )}

      {/* HISTORY DETAIL MODAL */}
      {histDetail&&<HistDetail week={histDetail.week} dayIdx={histDetail.dayIdx} store={store} onClose={()=>setHistDetail(null)}/>}
    </>
  );
}

function CompareTable({weekA,weekB,store}){
  const wdA=store.weeks[weekA]||mkWeekData();
  const wdB=store.weeks[weekB]||mkWeekData();
  return(
    <table className="compare-table">
      <thead><tr><th>EXERCISE</th><th>WK {weekA} MAX</th><th>WK {weekB} MAX</th><th>DIFF</th></tr></thead>
      <tbody>
        {DAYS.map((d,di)=>d.exercises.map((ex,ei)=>{
          const getMax=wd=>{const sets=(wd[di]?.sets[ei])||[];return Math.max(0,...sets.map(s=>parseFloat(s.kg)||0));};
          const a=getMax(wdA),b=getMax(wdB);
          const diff=b-a;
          const cls=diff>0?'up':diff<0?'down':'same';
          const diffStr=diff>0?`+${diff}kg`:diff<0?`${diff}kg`:'—';
          if(a===0&&b===0)return null;
          return(
            <tr key={`${di}-${ei}`}>
              <td style={{fontFamily:'var(--font-body)',fontWeight:600,fontSize:'0.8rem',color:'#e0e0f0'}}>{ex.name}</td>
              <td>{a>0?`${a}kg`:'—'}</td>
              <td>{b>0?`${b}kg`:'—'}</td>
              <td className={cls}>{diffStr}</td>
            </tr>
          );
        }))}
      </tbody>
    </table>
  );
}

function HistDetail({week,dayIdx,store,onClose}){
  const d=DAYS[dayIdx];
  const wd=store.weeks[week]||mkWeekData();
  const dayD=wd[dayIdx];
  const color=TYPE_COLOR[d.type];
  return(
    <div className="modal-overlay">
      <div className="modal-head">
        <button className="modal-back" onClick={onClose}>←</button>
        <div className="modal-title" style={{color}}>WEEK {week} · {d.name} {d.label}</div>
        {dayD.done&&<div style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'var(--legs)'}}>COMPLETE ✓</div>}
      </div>
      <div className="modal-body">
        {d.exercises.map((ex,ei)=>{
          const sets=dayD.sets[ei]||[];
          const vol=sets.reduce((a,s)=>{const k=parseFloat(s.kg)||0,r=parseFloat(s.reps)||0;return a+k*r;},0);
          return(
            <div key={ei} className="ex-card" style={{marginBottom:'0.5rem'}}>
              <div className="ex-card-head">
                <div className="ex-card-name">{ex.name}</div>
                {vol>0&&<div style={{fontFamily:'var(--font-mono)',fontSize:'0.62rem',color:'var(--pull)'}}>VOL {Math.round(vol)}kg</div>}
              </div>
              <div style={{padding:'0.5rem 0.85rem'}}>
                {sets.map((s,si)=>(
                  <div key={si} style={{display:'flex',gap:'1rem',fontFamily:'var(--font-mono)',fontSize:'0.7rem',padding:'0.22rem 0',borderBottom:'1px solid var(--border)'}}>
                    <span style={{color:'#c0c0d0',minWidth:'36px'}}>S{si+1}</span>
                    <span style={{color:'#e0e0f0'}}>{s.kg?`${s.kg} kg`:'—'}</span>
                    <span style={{color:'#e0e0f0'}}>{s.reps?`${s.reps} reps`:'—'}</span>
                    {s.done&&<span style={{color:'var(--legs)',marginLeft:'auto'}}>✓</span>}
                  </div>
                ))}
                {dayD.notes[ei]&&(
                  <div style={{fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'#b8b8c8',marginTop:'0.35rem',paddingTop:'0.35rem',borderTop:'1px solid var(--border)'}}>
                    📝 {dayD.notes[ei]}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
