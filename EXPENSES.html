<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#2b2b2b;}
:root{
  --bg:#2b2b2b;--s1:#333333;--s2:#3d3d3d;--s3:#474747;--s4:#515151;
  --border:#555555;--border2:#606060;
  --red:#ff5555;--orange:#ff8c00;--green:#b2ff59;--blue:#29e6ff;--yellow:#ffd600;--purple:#c084fc;
  --text:#e8e8e8;--text2:#cccccc;--text3:#aaaaaa;--dim:#4a4a4a;--muted:#888888;--faint:#3a3a3a;
  --font-d:'Bebas Neue',sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-b:'Barlow Condensed',sans-serif;
}
#root{height:100%;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--dim);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

const CATS = [
  {id:'groceries',  label:'Groceries',   icon:'🛒', color:'#ff8c00'},
  {id:'transport',  label:'Transport',   icon:'🚌', color:'#00c8ff'},
  {id:'gym',        label:'Gym',         icon:'💪', color:'#ff3d00'},
  {id:'shopping',   label:'Shopping',    icon:'🛍️', color:'#c084fc'},
  {id:'bills',      label:'Bills',       icon:'📄', color:'#ffd600'},
  {id:'dining',     label:'Dining Out',  icon:'🍽️', color:'#39d98a'},
  {id:'entertain',  label:'Entertain',   icon:'🎮', color:'#00c8ff'},
  {id:'health',     label:'Health',      icon:'💊', color:'#ff6b6b'},
  {id:'other',      label:'Other',       icon:'📦', color:'#888'},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.id,c]));

const fmt = n => `£${Number(n).toFixed(2)}`;
const fmtShort = n => n >= 1000 ? `£${(n/1000).toFixed(1)}k` : `£${Number(n).toFixed(0)}`;
const today = () => new Date().toISOString().slice(0,10);
const monthKey = d => d.slice(0,7);
const weekOfYear = d => {
  const dt = new Date(d);
  const jan1 = new Date(dt.getFullYear(),0,1);
  return `${dt.getFullYear()}-W${String(Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7)).padStart(2,'0')}`;
};
const dayName = d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(d).getDay()];
const monthName = m => ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m.split('-')[1])-1];

function loadStore() {
  try { const r=localStorage.getItem('spent_v2'); if(r) return JSON.parse(r); } catch(e){}
  return { expenses:[], weekBudget:200, monthBudget:800, catBudgets:{} };
}
function loadShiftsIncome() {
  // Pull weekly earnings from shifts data for income vs spend crossover
  try {
    const s=JSON.parse(localStorage.getItem('shifts_v4')||'null');
    if(!s||!s.shifts) return {weekIncome:0,monthIncome:0,rate:12.21};
    const now=new Date();
    const day=now.getDay();
    const mon=new Date(now);
    mon.setDate(now.getDate()-(day===0?6:day-1));
    const wDates=[];
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);wDates.push(d.toISOString().slice(0,10));}
    const mKey=now.toISOString().slice(0,7);
    const rate=s.hourlyRate||12.21;
    const weekIncome=s.shifts.filter(x=>wDates.includes(x.date)).reduce((a,x)=>a+x.hours*rate,0);
    const monthIncome=s.shifts.filter(x=>x.date.startsWith(mKey)).reduce((a,x)=>a+x.hours*rate,0);
    return{weekIncome,monthIncome,rate};
  } catch(e){return{weekIncome:0,monthIncome:0,rate:12.21};}
}
function saveStore(s) {
  try { localStorage.setItem('spent_v2', JSON.stringify(s)); } catch(e){}
}
let _id = Date.now();
const uid = () => (typeof crypto!=='undefined'&&crypto.randomUUID) ? crypto.randomUUID() : String(++_id);

const CSS = `
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes popIn{from{transform:scale(0.93);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg);overflow:hidden;}

  .field-label{font-family:var(--font-m);font-size:0.62rem;color:var(--text3);letter-spacing:0.08em;margin-bottom:0.45rem;}

/* ── TAP EXP ITEM — tap = action sheet, swipe = still works ── */
function TapExpItem({e, onDelete, onEdit}) {
  const [showActions, setShowActions] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const cat = CAT[e.cat];
  const startX = useRef(null);
  const didSwipe = useRef(false);

  function onTouchStart(ev) { startX.current = ev.touches[0].clientX; didSwipe.current = false; }
  function onTouchEnd(ev) {
    if (startX.current === null) return;
    const dx = startX.current - ev.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) { didSwipe.current = true; }
    startX.current = null;
  }
  function handleClick() {
    if (didSwipe.current) return;
    setShowActions(true);
    setConfirmDel(false);
  }

  return (
    <>
      <div
        className="exp-item"
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
        onClick={handleClick}
        style={{borderLeft:`3px solid ${cat?.color||'#444'}`,paddingLeft:'0.85rem'}}
      >
        <div className="exp-icon" style={{fontSize:'1.35rem',background:'none',border:'none',width:'28px',height:'28px',flexShrink:0}}>{cat?.icon}</div>
        <div className="exp-info">
          <div className="exp-cat" style={{color:cat?.color||'var(--text)'}}>{cat?.label}{e.recurring&&<span style={{fontFamily:'var(--font-m)',fontSize:'0.48rem',color:'var(--yellow)',border:'1px solid rgba(255,214,0,0.4)',padding:'0.05rem 0.3rem',marginLeft:'0.4rem',borderRadius:'2px',letterSpacing:'0.04em'}}>↻ REC</span>}</div>
          {e.note && <div className="exp-note">{e.note}</div>}
          <div className="exp-date">{e.date=== today()?'TODAY':e.date}</div>
        </div>
        <div className="exp-amt" style={{color:cat?.color||'var(--text)'}}>{fmt(e.amount)}</div>
      </div>

      {showActions && (
        <div className="modal-overlay" onClick={()=>{setShowActions(false);setConfirmDel(false);}}>
          <div className="modal" onClick={ev=>ev.stopPropagation()} style={{padding:'1.25rem'}}>
            <div style={{display:'flex',alignItems:'center',gap:'0.65rem',marginBottom:'1rem',paddingBottom:'0.85rem',borderBottom:'1px solid var(--border)'}}>
              <div style={{fontSize:'1.6rem'}}>{cat?.icon}</div>
              <div>
                <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',letterSpacing:'0.06em',color:cat?.color||'var(--text)'}}>{cat?.label}</div>
                <div style={{fontFamily:'var(--font-d)',fontSize:'1.5rem',color:'var(--text)',letterSpacing:'0.04em'}}>{fmt(e.amount)}</div>
                {e.note&&<div style={{fontFamily:'var(--font-m)',fontSize:'0.6rem',color:'var(--text3)',marginTop:'2px'}}>{e.note}</div>}
              </div>
            </div>
            {!confirmDel ? (
              <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
                <button className="modal-btn" style={{textAlign:'left',padding:'0.75rem 1rem',fontFamily:'var(--font-m)',fontSize:'0.72rem',letterSpacing:'0.04em'}}
                  onClick={()=>{setShowActions(false);onEdit(e);}}>✏️ EDIT EXPENSE</button>
                <button className="modal-btn" style={{textAlign:'left',padding:'0.75rem 1rem',fontFamily:'var(--font-m)',fontSize:'0.72rem',letterSpacing:'0.04em',borderColor:'rgba(255,61,0,0.4)',color:'var(--red)'}}
                  onClick={()=>setConfirmDel(true)}>🗑️ DELETE</button>
                <button className="modal-btn" style={{textAlign:'center',padding:'0.65rem',fontFamily:'var(--font-m)',fontSize:'0.65rem',color:'var(--text3)'}}
                  onClick={()=>setShowActions(false)}>CANCEL</button>
              </div>
            ) : (
              <div>
                <div style={{fontFamily:'var(--font-m)',fontSize:'0.65rem',color:'var(--text3)',letterSpacing:'0.06em',textAlign:'center',marginBottom:'1rem'}}>DELETE THIS EXPENSE?</div>
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button className="modal-btn" onClick={()=>setConfirmDel(false)}>CANCEL</button>
                  <button className="modal-btn primary" style={{background:'var(--red)',borderColor:'var(--red)'}} onClick={()=>{onDelete(e.id);setShowActions(false);}}>DELETE</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

/* ── DONUT CHART ── */
function DonutChart({data, size=120}) {
  const [animated, setAnimated] = useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setAnimated(true),30); return ()=>clearTimeout(t); },[data]);
  const total = data.reduce((a,b)=>a+b.val,0);
  if (!total) return (
    <div style={{width:size,height:size,background:'var(--s2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <span style={{fontFamily:'var(--font-m)',fontSize:'0.55rem',color:'var(--text3)'}}>NO DATA</span>
    </div>
  );
  let offset = 0;
  const r = 40, cx = 60, cy = 60, stroke = 18;
  const circ = 2*Math.PI*r;
  const slices = data.map(d => {
    const pct = d.val/total;
    const dash = pct*circ;
    const s = {offset, dash, pct};
    offset += dash;
    return s;
  });
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" className="donut-svg" style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--dim)" strokeWidth={stroke}/>
      {data.map((d,i) => (
        <circle key={i} cx={cx} cy={cy} r={r} fill="none"
          stroke={d.color} strokeWidth={stroke}
          strokeDasharray={animated ? `${slices[i].dash} ${circ-slices[i].dash}` : `0 ${circ}`}
          strokeDashoffset={-slices[i].offset}
          transform="rotate(-90 60 60)"
          opacity={0.9}
          style={{transition:`stroke-dasharray ${0.5+i*0.08}s cubic-bezier(0.4,0,0.2,1)`}}
        />
      ))}
      <text x={cx} y={cy-4} textAnchor="middle" fill="#f5f5f5" fontFamily="'Bebas Neue'" fontSize="13">{fmtShort(total)}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#888" fontFamily="'JetBrains Mono'" fontSize="6">TOTAL</text>
    </svg>
  );
}

/* ── MAIN APP ── */
function App() {
  const [store, setStore] = useState(()=>loadStore());

  function handleTabSwipe(dx, dy) {

      const idx = TABS.indexOf(tab);
      if (dx < 0 && idx < TABS.length - 1) setTab(TABS[idx + 1]);
      else if (dx > 0 && idx > 0) setTab(TABS[idx - 1]);

  }
  // compare
  const [cmpA, setCmpA] = useState('');
  const [cmpB, setCmpB] = useState('');
  // budget modal
  const [showBudget, setShowBudget] = useState(false);
  const [bwInput, setBwInput] = useState('');
  const [bmInput, setBmInput] = useState('');
  const [catBudgetInputs, setCatBudgetInputs] = useState({});
  const [budgetTab, setBudgetTab] = useState('overall');
  // history expand
  const [expandedWeek, setExpandedWeek] = useState(null);
  // toast
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  // edit modal
  const [editExp, setEditExp] = useState(null);
  const [editAmount, setEditAmount] = useState('');
  const [editCat, setEditCat] = useState('');
  const [editNote, setEditNote] = useState('');
  const [editDate, setEditDate] = useState('');

  // recurring prompt
  const [recurringDue, setRecurringDue] = useState([]);
  const [showRecurring, setShowRecurring] = useState(false);

  useEffect(()=>{
    // Find recurring expenses not yet logged this month
    const thisMonth = today().slice(0,7);
    const recurringExps = store.expenses.filter(e=>e.recurring);
    // Get unique recurring templates (most recent per cat+note combo)
    const seen = new Map();
    [...recurringExps].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
      const key = `${e.cat}||${e.note||''}`;
      if (!seen.has(key)) seen.set(key, e);
    });
    // Filter those not already added this month
    const alreadyThisMonth = new Set(
      store.expenses.filter(e=>e.date.startsWith(thisMonth)&&e.recurring).map(e=>`${e.cat}||${e.note||''}`)
    );
    const due = [...seen.values()].filter(e=>!alreadyThisMonth.has(`${e.cat}||${e.note||''}`));
    if (due.length > 0) { setRecurringDue(due); setShowRecurring(true); }
  // eslint-disable-next-line
  }, []);

  function addRecurringExpense(e) {
    const exp = { id:uid(), amount:e.amount, cat:e.cat, note:e.note, date:today(), recurring:true };
    update(s => { s.expenses = [exp, ...s.expenses]; });
    setRecurringDue(prev => prev.filter(x=>`${x.cat}||${x.note||''}`!==`${e.cat}||${e.note||''}`));
    showToast(`✓ ${fmt(e.amount)} added`);
  }

  function showToast(msg, isErr=false) {
    clearTimeout(toastTimer.current);
    setToast({msg, err:isErr});
    toastTimer.current = setTimeout(()=>setToast(null), 2000);
  }

  const update = useCallback(fn => {
    setStore(prev => {
      const next = {...prev, expenses:[...prev.expenses]};
      fn(next);
      saveStore(next);
      return next;
    });
  }, []);

  function addExpense() {
    if (!amount || isNaN(parseFloat(amount))) return;
    const exp = { id:uid(), amount:parseFloat(amount), cat, note, date, recurring:isRecurring };
    update(s => { s.expenses = [exp, ...s.expenses]; });
    setAmount(''); setNote(''); setDate(today());
    setAddFlash(true);
    setTimeout(()=>setAddFlash(false), 800);
    showToast(`✓ ${fmt(exp.amount)} added to ${CAT[cat]?.label}${isRecurring?' (recurring)':''}`);
  }

  function delExpense(id) {
    const exp = store.expenses.find(e=>e.id===id);
    update(s => { s.expenses = s.expenses.filter(e=>e.id!==id); });
    showToast(`Deleted ${exp ? fmt(exp.amount) : 'expense'}`);
  }

  function openEdit(exp) {
    setEditExp(exp);
    setEditAmount(String(exp.amount));
    setEditCat(exp.cat);
    setEditNote(exp.note||'');
    setEditDate(exp.date);
  }

  function saveEdit() {
    if (!editAmount || isNaN(parseFloat(editAmount))) return;
    update(s => {
      s.expenses = s.expenses.map(e => e.id===editExp.id
        ? {...e, amount:parseFloat(editAmount), cat:editCat, note:editNote, date:editDate}
        : e
      );
    });
    setEditExp(null);
    showToast('✓ Expense updated');
  }

  function saveBudget() {
    if (bwInput && isNaN(parseFloat(bwInput))) return;
    if (bmInput && isNaN(parseFloat(bmInput))) return;
    update(s => {
      if (bwInput) s.weekBudget = parseFloat(bwInput);
      if (bmInput) s.monthBudget = parseFloat(bmInput);
      const cb = {...(s.catBudgets||{})};
      Object.entries(catBudgetInputs).forEach(([id,v])=>{
        if (v===''||v===null) { delete cb[id]; }
        else if (!isNaN(parseFloat(v))) cb[id]=parseFloat(v);
      });
      s.catBudgets = cb;
    });
    setShowBudget(false);
    showToast('✓ Budgets saved');
  }

  function exportCSV() {
    const rows = [['Date','Category','Amount','Note']];
    store.expenses.forEach(e => rows.push([e.date, CAT[e.cat]?.label||e.cat, e.amount.toFixed(2), e.note||'']));
    const csv = rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='spent-expenses.csv'; a.click();
    URL.revokeObjectURL(url);
    showToast('✓ CSV downloaded');
  }

  const expenses = store.expenses;

  // Note suggestions: recent unique notes for selected category
  const recentNotes = useMemo(()=>{
    const seen = new Set();
    return expenses
      .filter(e=>e.cat===cat&&e.note)
      .sort((a,b)=>b.id.localeCompare(a.id))
      .map(e=>e.note)
      .filter(n=>{ if(seen.has(n)) return false; seen.add(n); return true; })
      .slice(0,6);
  },[expenses,cat]);

  const todayExps = useMemo(()=>expenses.filter(e=>e.date===today()),[expenses]);
  const todayTotal = useMemo(()=>todayExps.reduce((a,e)=>a+e.amount,0),[todayExps]);

  const last7 = useMemo(()=>{
    const now=new Date();
    const day=now.getDay();
    const mon=new Date(now);
    mon.setDate(now.getDate()-(day===0?6:day-1));
    const days=[];
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      days.push(d.toISOString().slice(0,10));
    }
    return days;
  },[]);

  const dayTotals = useMemo(()=>{
    const m={};
    expenses.forEach(e=>{ m[e.date]=(m[e.date]||0)+e.amount; });
    return m;
  },[expenses]);

  const weekTotal = useMemo(()=>last7.reduce((a,d)=>a+(dayTotals[d]||0),0),[last7,dayTotals]);
  const selectedDayExps = useMemo(()=>expenses.filter(e=>e.date===selectedDay).sort((a,b)=>b.id.localeCompare(a.id)),[expenses,selectedDay]);
  const weekPct = Math.min(100, (weekTotal/store.weekBudget)*100);
  const weekOver = weekTotal > store.weekBudget;

  const weekCatTotals = useMemo(()=>{
    const m={};
    last7.forEach(d=>{ expenses.filter(e=>e.date===d).forEach(e=>{ m[e.cat]=(m[e.cat]||0)+e.amount; }); });
    return m;
  },[expenses,last7]);

  const allWeeks = useMemo(()=>{
    const m={};
    expenses.forEach(e=>{
      const wk=weekOfYear(e.date);
      if(!m[wk]) m[wk]={week:wk,total:0,count:0,days:{}};
      m[wk].total+=e.amount; m[wk].count++;
      m[wk].days[e.date]=(m[wk].days[e.date]||0)+e.amount;
    });
    return Object.values(m).sort((a,b)=>b.week.localeCompare(a.week));
  },[expenses]);

  const weekKeys = allWeeks.map(w=>w.week);

  const monthExps = useMemo(()=>expenses.filter(e=>e.date.startsWith(viewMonth)),[expenses,viewMonth]);
  const monthTotal = useMemo(()=>monthExps.reduce((a,e)=>a+e.amount,0),[monthExps]);
  const monthPct = Math.min(100,(monthTotal/store.monthBudget)*100);
  const monthOver = monthTotal > store.monthBudget;

  const monthCatTotals = useMemo(()=>{
    const m={};
    monthExps.forEach(e=>{ m[e.cat]=(m[e.cat]||0)+e.amount; });
    return m;
  },[monthExps]);

  const monthDayTotals = useMemo(()=>{
    const m={};
    monthExps.forEach(e=>{ m[e.date]=(m[e.date]||0)+e.amount; });

                    const isToday=d===today();
                    const isSel=selMonthDay===d;
                    const intensity=amt>0?Math.max(0.15,Math.min(1,amt/maxDaySpend)):0;
                    const dayExps=monthExps.filter(e=>e.date===d);
                    const topCats=[...new Set(dayExps.map(e=>e.cat))].slice(0,3);
                    return (
                      <div key={d} className={`day-cell ${isToday?'today-cell':''} ${amt>0?'has-spend':''} ${isSel?'sel-cell':''}`}
                        onClick={()=>setSelMonthDay(isSel?null:d)}
                        style={amt>0&&!isSel?{borderColor:`rgba(255,140,0,${intensity*0.8})`}:{}}
                      >
                        <div className="day-cell-num">{parseInt(d.split('-')[2])}</div>
                        <div style={{display:'flex',gap:'1px',marginTop:'2px'}}>
                          {topCats.map(cid=>(
                            <div key={cid} style={{width:'5px',height:'5px',borderRadius:'50%',background:CAT[cid]?.color||'#888'}}/>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {selMonthDay && (
                  <div style={{marginTop:'0.75rem',borderTop:'1px solid var(--border)',paddingTop:'0.75rem'}}>
                    <div style={{fontFamily:'var(--font-d)',fontSize:'1rem',letterSpacing:'0.06em',marginBottom:'0.5rem',color:'var(--orange)'}}>
                      {selMonthDay} · {fmt(monthDayTotals[selMonthDay]||0)}
                    </div>
                    {selMonthDayExps.map(e=>(
                      <TapExpItem key={e.id} e={e} onDelete={delExpense} onEdit={openEdit}/>
                    ))}
                  </div>
                )}
              </div>

              {/* Category breakdown */}
              <div className="month-cat-section">
                <div className="mcs-title">BY CATEGORY</div>
                {CATS.filter(c=>monthCatTotals[c.id]>0).sort((a,b)=>monthCatTotals[b.id]-monthCatTotals[a.id]).map(c=>{
                  const pct=(monthCatTotals[c.id]/monthTotal)*100;
                  return (
                    <div key={c.id} className="mcs-row">
                      <span className="mcs-icon">{c.icon}</span>
                      <span className="mcs-lbl">{c.label}</span>
                      <div className="mcs-bar-wrap">
                        <div className="mcs-bar" style={{width:pct+'%',background:c.color}}/>
                      </div>
                      <span className="mcs-amt">{fmt(monthCatTotals[c.id])}</span>
                    </div>
                  );
                })}
                {monthExps.length===0&&(
                  <div style={{fontFamily:'var(--font-m)',fontSize:'0.62rem',color:'var(--text3)'}}>NO EXPENSES THIS MONTH</div>
                )}
              </div>

              {/* Daily list — now shows ALL days with a "show more" */}
              {visibleMonthDays.map(({date:d,total:t,exps:es})=>(
                <div key={d} className="daily-list">
                  <div className="dl-head">
                    <div className="dl-date">{d} {dayName(d)}</div>
                    <div className="dl-total">{fmt(t)}</div>
                  </div>
                  <div className="dl-body">
                    {es.map(e=>(
                      <TapExpItem key={e.id} e={e} onDelete={delExpense} onEdit={openEdit}/>
                    ))}
                  </div>
                </div>
              ))}
              {monthDaysGrouped.length > 10 && !showAllMonthDays && (
                <button onClick={()=>setShowAllMonthDays(true)}
                  style={{width:'100%',fontFamily:'var(--font-m)',fontSize:'0.65rem',padding:'0.65rem',
                    border:'1px solid var(--border2)',background:'var(--s2)',color:'var(--text2)',cursor:'pointer',
                    letterSpacing:'0.06em',marginBottom:'0.6rem'}}>
                  SHOW ALL {monthDaysGrouped.length} DAYS ▼
                </button>
              )}
            </div>
          </div>
        )}

        {/* BOTTOM NAV */}
        <div className="bnav">
          {[
            {id:'add',icon:'➕',label:'ADD'},
            {id:'expenses',icon:'📋',label:'EXPENSES'},
            {id:'analytics',icon:'📊',label:'ANALYTICS'},
            {id:'monthly',icon:'🗓️',label:'MONTHLY'},
          ].map(n=>(
            <button key={n.id} className={`bnav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
              <span className="bnav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
      </div>

      {/* BUDGET MODAL */}
      {showBudget && (
        <div className="modal-overlay" onClick={()=>setShowBudget(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh',overflowY:'auto'}}>
            <div className="modal-title">SET BUDGETS</div>
            {/* Tab switcher */}
            <div className="tab-row" style={{marginBottom:'0.85rem'}}>
              <button className={`tab-btn ${budgetTab==='overall'?'active-tab':''}`} onClick={()=>setBudgetTab('overall')}>OVERALL</button>
              <button className={`tab-btn ${budgetTab==='category'?'active-tab':''}`} onClick={()=>setBudgetTab('category')}>BY CATEGORY</button>
            </div>
            {budgetTab==='overall' ? (
              <>
                <div className="modal-sub">LEAVE BLANK TO KEEP CURRENT</div>
                <div className="modal-lbl">WEEKLY BUDGET (£) — CURRENT: {fmt(store.weekBudget)}</div>
                <input className="modal-input" type="number" inputMode="decimal" value={bwInput} onChange={e=>setBwInput(e.target.value)} placeholder={store.weekBudget}/>
                <div className="modal-lbl">MONTHLY BUDGET (£) — CURRENT: {fmt(store.monthBudget)}</div>
                <input className="modal-input" type="number" inputMode="decimal" value={bmInput} onChange={e=>setBmInput(e.target.value)} placeholder={store.monthBudget}/>
              </>
            ) : (
              <>
                <div className="modal-sub">SET A MONTHLY LIMIT PER CATEGORY · LEAVE BLANK FOR NONE</div>
                {CATS.map(c=>(
                  <div key={c.id}>
                    <div className="modal-lbl" style={{display:'flex',alignItems:'center',gap:'0.4rem'}}>
                      <span>{c.icon}</span><span style={{color:c.color}}>{c.label.toUpperCase()}</span>
                      {store.catBudgets?.[c.id]>0&&<span style={{color:'var(--muted)',marginLeft:'auto'}}>current: {fmt(store.catBudgets[c.id])}</span>}
                    </div>
                    <input className="modal-input" type="number" inputMode="decimal"
                      value={catBudgetInputs[c.id]||''}
                      onChange={e=>setCatBudgetInputs(v=>({...v,[c.id]:e.target.value}))}
                      placeholder="no limit"
                      style={{fontSize:'1.1rem',padding:'0.45rem 0.75rem'}}
                    />
                  </div>
                ))}
              </>
            )}
            <div className="modal-btns">
              <button className="modal-btn" onClick={()=>setShowBudget(false)}>CANCEL</button>
              <button className="modal-btn primary" onClick={saveBudget}>SAVE</button>
            </div>
          </div>
        </div>
      )}

      {/* RECURRING DUE MODAL */}
      {showRecurring && recurringDue.length > 0 && (
        <div className="modal-overlay" onClick={()=>setShowRecurring(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:'88vh',overflowY:'auto'}}>
            <div className="modal-title">↻ RECURRING</div>
            <div className="modal-sub">{recurringDue.length} EXPENSE{recurringDue.length>1?'S':''} DUE THIS MONTH — ADD THEM NOW?</div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',margin:'0.85rem 0'}}>
              {recurringDue.map(e=>{
                const c=CAT[e.cat];
                return (
                  <div key={e.id} style={{display:'flex',alignItems:'center',gap:'0.75rem',background:'var(--s2)',border:'1px solid var(--border)',padding:'0.75rem 1rem',borderLeft:`3px solid ${c?.color||'#444'}`}}>
                    <span style={{fontSize:'1.3rem'}}>{c?.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:'var(--font-b)',fontWeight:700,fontSize:'1rem',color:c?.color||'var(--text)'}}>{c?.label}</div>
                      {e.note&&<div style={{fontFamily:'var(--font-m)',fontSize:'0.58rem',color:'var(--text3)'}}>{e.note}</div>}
                    </div>
                    <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',color:'var(--text)',marginRight:'0.5rem'}}>{fmt(e.amount)}</div>
                    <button className="modal-btn primary" style={{padding:'0.4rem 0.75rem',fontSize:'0.75rem',fontFamily:'var(--font-m)',letterSpacing:'0.04em',minWidth:'auto'}}
                      onClick={()=>addRecurringExpense(e)}>ADD</button>
                  </div>
                );
              })}
            </div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={()=>setShowRecurring(false)}>DISMISS</button>
              <button className="modal-btn primary" onClick={()=>{recurringDue.forEach(e=>addRecurringExpense(e));setShowRecurring(false);}}>ADD ALL</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT EXPENSE MODAL */}
      {editExp && (
        <div className="modal-overlay" onClick={()=>setEditExp(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:'90vh',overflowY:'auto'}}>
            <div className="modal-title">EDIT EXPENSE</div>
            <div className="edit-field">
              <div className="modal-lbl">AMOUNT (£)</div>
              <input className="modal-input" type="number" inputMode="decimal" value={editAmount} onChange={e=>setEditAmount(e.target.value)}/>
            </div>
            <div className="edit-field">
              <div className="modal-lbl">CATEGORY</div>
              <div className="edit-cat-grid">
                {CATS.map(c=>(
                  <div key={c.id} className={`edit-cat-btn ${editCat===c.id?'sel':''}`}
                    style={editCat===c.id?{borderColor:c.color}:{}}
                    onClick={()=>setEditCat(c.id)}>
                    <span>{c.icon}</span>
                    <span className="edit-cat-lbl" style={editCat===c.id?{color:c.color}:{}}>{c.label}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="edit-field">
              <div className="modal-lbl">NOTE</div>
              <input className="modal-input" style={{fontFamily:'var(--font-b)',fontSize:'1rem'}} type="text" value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="optional note"/>
            </div>
            <div className="edit-field">
              <div className="modal-lbl">DATE</div>
              <input className="modal-input date-input" type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}/>
            </div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={()=>setEditExp(null)}>CANCEL</button>
              <button className="modal-btn primary" onClick={saveEdit}>SAVE</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
